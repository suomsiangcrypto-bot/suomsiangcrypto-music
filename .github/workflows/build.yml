name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        run: npm run build-win

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: SUOMSIANGCRYPTO-MUSIC-Portable
          path: dist/SUOMSIANGCRYPTO-MUSIC-Portable.exe
          retention-days: 90

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: SUOMSIANGCRYPTO-MUSIC-Installer
          path: dist/*.exe
          retention-days: 90
